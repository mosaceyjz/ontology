<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企业级 AI 本体架构与智能语义控制</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- 引入 Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .slide-up { animation: slideUp 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    /* 卡片悬浮发光效果 */
    .glow-hover:hover { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); border-color: #818cf8; }
  </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 flex justify-center min-h-screen font-sans">

  <div id="root" class="w-full max-w-5xl"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- 内置图标组件 ---
    const IconBrain = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/></svg>);
    const IconNetwork = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg>);
    const IconLayers = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>);
    const IconShield = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>);
    const IconActivity = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>);
    const IconTarget = ({ className, size=24 }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>);

    const App = () => {
      const [activeTab, setActiveTab] = useState('architecture');

      return (
        <div className="w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
          
          {/* Header */}
          <div className="bg-slate-900 p-8 text-white relative overflow-hidden">
            <div className="absolute top-0 right-0 opacity-10 transform translate-x-1/4 -translate-y-1/4">
              <IconNetwork size={300} />
            </div>
            <div className="relative z-10">
              <div className="flex items-center gap-3 mb-3">
                <IconBrain className="text-indigo-400" size={32} />
                <h2 className="text-indigo-300 font-bold tracking-widest text-sm uppercase">企业级 AI 核心架构</h2>
              </div>
              <h1 className="text-3xl md:text-4xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 via-blue-300 to-white">
                智能语义控制层 & 本体三层架构
              </h1>
              <p className="text-slate-300 max-w-3xl leading-relaxed text-lg">
                以本体工程为核心，实现 AI 与企业业务的深度、安全、可控融合，驱动业务流程自动化与智能化。
              </p>
            </div>
          </div>

          {/* Navigation */}
          <div className="flex flex-col md:flex-row border-b border-slate-200 bg-slate-50">
            <button onClick={() => setActiveTab('vision')} className={`flex-1 py-4 px-6 font-bold text-base md:text-lg transition-all flex items-center justify-center gap-2 ${activeTab === 'vision' ? 'bg-white text-blue-600 border-b-4 border-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
              <IconTarget size={20} /> 1. 战略愿景
            </button>
            <button onClick={() => setActiveTab('architecture')} className={`flex-1 py-4 px-6 font-bold text-base md:text-lg transition-all flex items-center justify-center gap-2 ${activeTab === 'architecture' ? 'bg-white text-indigo-600 border-b-4 border-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
              <IconLayers size={20} /> 2. 本体三层架构 (核心)
            </button>
            <button onClick={() => setActiveTab('application')} className={`flex-1 py-4 px-6 font-bold text-base md:text-lg transition-all flex items-center justify-center gap-2 ${activeTab === 'application' ? 'bg-white text-emerald-600 border-b-4 border-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-100'}`}>
              <IconActivity size={20} /> 3. 落地应用
            </button>
          </div>

          {/* Content Container */}
          <div className="p-6 md:p-10 min-h-[550px] bg-white">
            
            {/* --- TAB 1: 战略愿景 --- */}
            {activeTab === 'vision' && (
              <div className="space-y-8 fade-in slide-up">
                <div className="text-center mb-10">
                  <h3 className="text-2xl font-bold text-slate-800 mb-4">通过智能语义控制层，实现人机协同</h3>
                  <p className="text-slate-600">以本体工程为核心大脑，打破物理世界与数字世界的壁垒。</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <div className="bg-blue-50 border border-blue-100 p-6 rounded-2xl">
                    <div className="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl mb-4">1</div>
                    <h4 className="text-xl font-bold text-blue-900 mb-3">统一业务语义模型</h4>
                    <p className="text-slate-700 leading-relaxed">
                      构建连接物理世界与数字世界的桥梁。作为 AI 理解企业的<strong>“知识大脑”</strong>，让 AI 真正懂得企业内部的各种概念和逻辑。
                    </p>
                  </div>
                  <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl">
                    <div className="bg-indigo-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl mb-4">2</div>
                    <h4 className="text-xl font-bold text-indigo-900 mb-3">融合 AI 与业务系统</h4>
                    <p className="text-slate-700 leading-relaxed">
                      将大模型的能力与本体系统的行为定义、协同机制深度结合。不仅让 AI <strong>“能理解”</strong>，更赋予其强大的<strong>“行动力”</strong>。
                    </p>
                  </div>
                  <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-2xl">
                    <div className="bg-emerald-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold text-xl mb-4">3</div>
                    <h4 className="text-xl font-bold text-emerald-900 mb-3">无缝嵌入工作流</h4>
                    <p className="text-slate-700 leading-relaxed">
                      最终目标是将 AI 变成企业的无形资产，驱动现有业务流程的自动化和智能化，实现高效、安全的<strong>人机协同</strong>生态。
                    </p>
                  </div>
                </div>
              </div>
            )}

            {/* --- TAB 2: 本体三层架构 (笔记核心) --- */}
            {activeTab === 'architecture' && (
              <div className="fade-in slide-up space-y-8">
                <p className="text-slate-600 text-center text-lg mb-8 max-w-3xl mx-auto">
                  现代企业级 AI 并非直接连接底层数据库，而是通过构建严密的<strong>“本体三层架构”</strong>，保障 AI 代理 (AI Agent) 能够精准、合规地执行业务任务。
                </p>

                <div className="flex flex-col gap-6 relative">
                  
                  {/* Layer 2: 动态层 (Top) */}
                  <div className="bg-white border-2 border-orange-200 rounded-xl p-6 shadow-sm glow-hover relative z-10 ml-0 md:ml-12">
                    <div className="absolute -left-4 -top-4 bg-orange-500 text-white px-4 py-1 rounded-full font-bold shadow-md flex items-center gap-2">
                      <IconActivity size={16}/> 动态层 (Dynamic Layer)
                    </div>
                    <h4 className="text-orange-800 font-bold mb-1 mt-2 text-lg">聚焦：做什么？如何更新？如何触发？</h4>
                    <p className="text-sm text-slate-500 mb-4 border-b border-orange-100 pb-3">赋予本体系统动态执行力，是 AI 代理行动的准则。</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="bg-orange-50 p-4 rounded-lg">
                        <span className="font-bold text-orange-900 block mb-1">⚡ 操作函数</span>
                        <span className="text-sm text-slate-700">将审批、创建、修改等业务动作封装为可调用 API 函数，供 AI 代理直接执行。</span>
                      </div>
                      <div className="bg-orange-50 p-4 rounded-lg">
                        <span className="font-bold text-orange-900 block mb-1">🔒 安全写回机制</span>
                        <span className="text-sm text-slate-700">定义严格策略，确保 AI 的决策能安全、合规地更新至 ERP/CRM 等源系统。</span>
                      </div>
                      <div className="bg-orange-50 p-4 rounded-lg">
                        <span className="font-bold text-orange-900 block mb-1">🔮 决策流与模拟</span>
                        <span className="text-sm text-slate-700">支持构建复杂决策流程，并进行 <strong>What-If</strong> 场景模拟分析，提前评估决策影响。</span>
                      </div>
                    </div>
                  </div>

                  {/* Visual Connector */}
                  <div className="hidden md:block absolute left-24 top-24 bottom-24 w-1 bg-slate-200 z-0"></div>

                  {/* Layer 1: 语义层/静态层 (Middle) */}
                  <div className="bg-white border-2 border-blue-200 rounded-xl p-6 shadow-sm glow-hover relative z-10 ml-0 md:ml-6">
                    <div className="absolute -left-4 -top-4 bg-blue-600 text-white px-4 py-1 rounded-full font-bold shadow-md flex items-center gap-2">
                      <IconNetwork size={16}/> 语义层/静态层 (Static Layer)
                    </div>
                    <h4 className="text-blue-900 font-bold mb-1 mt-2 text-lg">聚焦：企业是什么？有什么？怎么连？</h4>
                    <p className="text-sm text-slate-500 mb-4 border-b border-blue-100 pb-3">构建静态知识模型，定义全局概念抽象。</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                      <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <span className="font-bold text-blue-800 block mb-1">📦 对象 (Objects)</span>
                        <span className="text-xs text-slate-600">抽象核心业务实体（如客户、订单、设备），定义全局唯一标识。</span>
                      </div>
                      <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <span className="font-bold text-blue-800 block mb-1">🔗 关系 (Relations)</span>
                        <span className="text-xs text-slate-600">定义对象间的关联（如“订单属于客户”），编织多维业务网络。</span>
                      </div>
                      <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <span className="font-bold text-blue-800 block mb-1">📝 属性与元数据</span>
                        <span className="text-xs text-slate-600">为对象和关系附加详细的描述信息、类型和约束条件。</span>
                      </div>
                      <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                        <span className="font-bold text-blue-800 block mb-1">🗣️ 统一业务语言</span>
                        <span className="text-xs text-slate-600">映射异构系统字段，消除语义壁垒，让全公司使用同一套“语言”。</span>
                      </div>
                    </div>
                  </div>

                  {/* Layer 3: 映射层 (Bottom) */}
                  <div className="bg-slate-800 border-2 border-slate-700 rounded-xl p-6 shadow-sm glow-hover relative z-10">
                    <div className="absolute -left-4 -top-4 bg-slate-600 text-white px-4 py-1 rounded-full font-bold shadow-md flex items-center gap-2">
                      <IconShield size={16}/> 映射层 (Mapping Layer)
                    </div>
                    <h4 className="text-slate-200 font-bold mb-1 mt-2 text-lg">桥梁：物理数据与抽象模型、AI 与安全治理</h4>
                    <p className="text-sm text-slate-400 mb-4 border-b border-slate-700 pb-3">打通底层数据源，赋能大模型，筑牢安全底线。</p>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div className="bg-slate-700/50 p-4 rounded-lg text-slate-300">
                        <span className="font-bold text-white block mb-1">🗄️ 数据源投影</span>
                        <span className="text-sm">将底层数据库、API、数据仓库（如 Databricks）中的原始数据，实时映射投影到本体对象上。</span>
                      </div>
                      <div className="bg-slate-700/50 p-4 rounded-lg text-slate-300">
                        <span className="font-bold text-white block mb-1">🧠 AI 语义赋能</span>
                        <span className="text-sm">为大模型提供结构化业务上下文，使其基于企业真实数据回答，<strong>消除幻觉</strong>，提供语义检索。</span>
                      </div>
                      <div className="bg-slate-700/50 p-4 rounded-lg text-slate-300">
                        <span className="font-bold text-white block mb-1">🛡️ 全局安全治理</span>
                        <span className="text-sm">贯穿访问、推理、写回全流程，提供细粒度的权限控制、操作审计与合规性追踪。</span>
                      </div>
                    </div>
                  </div>

                </div>
              </div>
            )}

            {/* --- TAB 3: 落地应用 --- */}
            {activeTab === 'application' && (
              <div className="space-y-6 fade-in slide-up">
                <p className="text-slate-600 text-lg mb-8">基于上述的“本体三层架构”，大模型（LLM）不再仅仅是一个聊天机器人，而是深度融入业务的<strong>智能引擎</strong>。</p>

                <div className="flex flex-col md:flex-row gap-6 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div className="bg-blue-100 text-blue-600 p-4 rounded-full h-fit"><IconBrain /></div>
                  <div>
                    <h4 className="text-xl font-bold text-slate-800 mb-2">安全可靠的业务智能代办 (AI Agent)</h4>
                    <p className="text-slate-600 mb-3">利用<strong className="text-orange-600">动态层</strong>的操作函数和写回机制，AI 可以直接替人类干活。</p>
                    <div className="bg-slate-50 p-4 rounded border border-slate-100 text-sm text-slate-700">
                      <strong>场景：</strong> 销售询问“帮我给客户A追加 10% 的折扣”。大模型解析意图后，通过<strong className="text-blue-600">语义层</strong>识别“客户A”的实体ID，调用<strong className="text-orange-600">动态层</strong>的[审批申请函数]。在<strong className="text-slate-600">映射层</strong>的严格权限校验通过后，直接将折扣更新指令安全地写回 CRM 系统。
                    </div>
                  </div>
                </div>

                <div className="flex flex-col md:flex-row gap-6 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div className="bg-emerald-100 text-emerald-600 p-4 rounded-full h-fit"><IconNetwork /></div>
                  <div>
                    <h4 className="text-xl font-bold text-slate-800 mb-2">消除大模型幻觉的精准企微问答</h4>
                    <p className="text-slate-600 mb-3">利用<strong className="text-slate-700">映射层</strong>的 AI 语义赋能，让大模型的回答基于 100% 真实数据。</p>
                    <div className="bg-slate-50 p-4 rounded border border-slate-100 text-sm text-slate-700">
                      <strong>场景：</strong> 厂长询问“为什么昨天 3 号线产量下降？”。AI 不会瞎编，而是通过本体图谱查询 Databricks 投影过来的真实数据，发现 3号线 -> 关联的[主轴电机] -> 关联的[维修记录]显示发生过停机，从而给出有理有据的回答。
                    </div>
                  </div>
                </div>

                <div className="flex flex-col md:flex-row gap-6 bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                  <div className="bg-orange-100 text-orange-600 p-4 rounded-full h-fit"><IconActivity /></div>
                  <div>
                    <h4 className="text-xl font-bold text-slate-800 mb-2">What-If 业务沙盘推演</h4>
                    <p className="text-slate-600 mb-3">利用<strong className="text-orange-600">动态层</strong>的模拟功能和<strong className="text-blue-600">静态层</strong>的关系网络进行风险预估。</p>
                    <div className="bg-slate-50 p-4 rounded border border-slate-100 text-sm text-slate-700">
                      <strong>场景：</strong> 供应链经理提问：“如果我们把供应商B的零件交付期延迟 5 天，会有什么影响？”。本体系统模拟执行该策略，沿着对象关系网络层层推理，最终输出一份报告：“会导致延期 12 个客户订单，预计产生 50 万违约金风险”。
                    </div>
                  </div>
                </div>

              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
